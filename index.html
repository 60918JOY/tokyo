<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東京 | 購物拾光</title>
    <style>
        /* 日式文青色系與字體設定 */
        :root {
            --bg-paper: #F7F5F0; /* 米白宣紙色 */
            --text-ink: #4A4543; /* 深墨色 */
            --text-light: #8B8581; /* 淺褐色 */
            --accent-green: #7B8B6F; /* 抹茶綠 */
            --accent-brown: #A38061; /* 木質棕 */
            --border-line: #E2DDD5;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* 使用典雅的字體組合 */
            font-family: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--text-ink);
            padding-bottom: 80px;
            font-size: 15px;
            line-height: 1.6;
        }

        /* 頂部導航 - 極簡風 */
        header {
            background-color: var(--bg-paper);
            color: var(--text-ink);
            padding: 20px 15px 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 18px;
            font-weight: normal;
            letter-spacing: 2px;
            flex-grow: 1;
        }

        .btn-mode {
            background: transparent;
            border: 1px solid var(--text-ink);
            color: var(--text-ink);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-mode.active {
            background: var(--text-ink);
            color: var(--bg-paper);
        }

        /* 日期選擇列 */
        .day-selector {
            display: flex;
            overflow-x: auto;
            background: rgba(247, 245, 240, 0.95);
            padding: 12px 10px;
            position: sticky;
            top: 61px;
            z-index: 99;
            border-bottom: 1px dashed var(--border-line);
            scrollbar-width: none;
        }
        .day-selector::-webkit-scrollbar { display: none; }

        .day-btn {
            flex: 0 0 auto;
            padding: 6px 14px;
            margin: 0 6px;
            background: transparent;
            color: var(--text-light);
            border: none;
            font-size: 14px;
            letter-spacing: 1px;
            border-bottom: 2px solid transparent;
        }

        .day-btn.active {
            color: var(--accent-green);
            border-bottom: 2px solid var(--accent-green);
            font-weight: bold;
        }

        .container {
            padding: 20px 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* 文青風卡片設計 */
        .card {
            background: var(--white);
            border: 1px solid var(--border-line);
            padding: 18px;
            margin-bottom: 15px;
            position: relative;
            border-left: 4px solid var(--accent-green);
        }

        .card.transport { border-left-color: var(--accent-brown); }
        .card.hotel { border-left-color: #8D99AE; }

        .card-header {
            display: flex;
            align-items: baseline;
            margin-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 8px;
        }

        .card-time {
            font-size: 13px;
            color: var(--accent-green);
            margin-right: 12px;
            font-family: sans-serif;
            font-weight: bold;
        }

        .card-title {
            font-size: 16px;
            color: var(--text-ink);
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* 商店標籤 - 印章/標籤感 */
        .shop-box {
            margin-top: 12px;
        }

        .shop-title {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: #F9F9F9;
            color: var(--text-ink);
            padding: 4px 10px;
            font-size: 12px;
            border: 1px solid #EAEAEA;
            font-family: sans-serif;
        }

        /* 按鈕與連結 */
        .map-btn {
            display: inline-block;
            color: var(--accent-brown);
            text-decoration: none;
            font-size: 13px;
            margin-top: 12px;
            border-bottom: 1px solid var(--accent-brown);
            padding-bottom: 2px;
        }

        .edit-controls {
            display: none;
            margin-top: 15px;
            justify-content: flex-end;
            gap: 8px;
            padding-top: 10px;
        }

        .btn-action {
            background: transparent;
            padding: 4px 10px;
            border: 1px solid var(--border-line);
            font-size: 12px;
            cursor: pointer;
            color: var(--text-light);
        }
        .btn-action:hover { border-color: var(--text-ink); color: var(--text-ink); }
        
        .btn-add-spot {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px dashed var(--accent-green);
            color: var(--accent-green);
            letter-spacing: 1px;
            display: none;
            margin-top: 15px;
        }

        /* 清單設計 */
        h2.section-title {
            font-size: 16px;
            font-weight: normal;
            border-bottom: 1px solid var(--text-ink);
            padding-bottom: 8px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .shop-list-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-line);
        }

        .shop-list-item input[type="checkbox"] {
            margin-right: 15px;
            width: 16px;
            height: 16px;
            accent-color: var(--accent-green);
        }

        .shop-list-text {
            flex-grow: 1;
            font-size: 15px;
        }

        .shop-list-item.checked .shop-list-text {
            text-decoration: line-through;
            color: var(--text-light);
        }

        .delete-btn {
            color: #d63031;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 12px;
            padding: 4px;
        }

        .add-shop-item-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-shop-item-form input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid var(--border-line);
            background: var(--white);
            outline: none;
            font-family: sans-serif;
        }

        .add-shop-item-form button {
            padding: 10px 18px;
            background: var(--text-ink);
            color: var(--white);
            border: none;
            cursor: pointer;
        }

        /* 底部導航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-line);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-light);
            text-decoration: none;
            font-size: 11px;
            background: none;
            border: none;
            cursor: pointer;
            width: 25%;
            letter-spacing: 1px;
        }

        .nav-item.active {
            color: var(--accent-green);
        }

        .nav-icon {
            font-size: 18px;
            margin-bottom: 4px;
            font-family: sans-serif;
        }

        .info-list { list-style: none; }
        .info-list li {
            padding: 15px 0;
            border-bottom: 1px solid var(--border-line);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .info-label { font-size: 12px; color: var(--text-light); }
        .info-value { font-size: 15px; color: var(--text-ink); }
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">東京拾光</h1>
        <button class="btn-mode" id="editModeBtn" onclick="toggleEditMode()">編 輯</button>
    </header>

    <div class="day-selector" id="daySelector">
        <button class="day-btn active" onclick="switchDay(0)">7/9 木</button>
        <button class="day-btn" onclick="switchDay(1)">7/10 金</button>
        <button class="day-btn" onclick="switchDay(2)">7/11 土</button>
        <button class="day-btn" onclick="switchDay(3)">7/12 日</button>
        <button class="day-btn" onclick="switchDay(4)">7/13 月</button>
        <button class="day-btn" onclick="switchDay(5)">7/14 火</button>
        <button class="day-btn" onclick="switchDay(6)">7/15 水</button>
    </div>

    <div class="container">
        <div id="panel-itinerary" class="tab-panel active">
            <div id="itinerary-list"></div>
            <button class="btn-add-spot" id="addSpotBtn" onclick="addNewSpotPrompt()">+ 增 添 行 程</button>
        </div>

        <div id="panel-shopping" class="tab-panel">
            <h2 class="section-title">購 物 備 忘 錄</h2>
            <div class="add-shop-item-form">
                <input type="text" id="newShopItemInput" placeholder="記下心儀之物...">
                <button onclick="addShoppingItem()">記 錄</button>
            </div>
            <div id="shopping-list-container"></div>
        </div>

        <div id="panel-info" class="tab-panel">
            <h2 class="section-title">旅 途 資 訊</h2>
            <ul class="info-list">
                <li>
                    <span class="info-label">宿 泊</span>
                    <span class="info-value">池袋之家 (House Ikebukuro)</span>
                </li>
                <li>
                    <span class="info-label">地 址</span>
                    <span class="info-value" style="font-family:sans-serif; font-size:14px;">2-20-1, Ikebukuro, Toshima-ku, Tokyo</span>
                    <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=池袋之家" target="_blank">地圖導覽</a>
                </li>
                <li>
                    <span class="info-label">往 路 (7/9)</span>
                    <span class="info-value" style="font-family:sans-serif;">02:00 TPE → 06:30 NRT (樂桃 MM620)</span>
                </li>
                <li>
                    <span class="info-label">復 路 (7/15)</span>
                    <span class="info-value" style="font-family:sans-serif;">22:15 NRT → 01:00 TPE (樂桃 MM627)</span>
                </li>
            </ul>
        </div>

        <div id="panel-packing" class="tab-panel">
            <h2 class="section-title">行 囊 點 檢</h2>
            <div id="packing-list-container"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('itinerary', this)">
            <span class="nav-icon">◒</span><span>行 程</span>
        </button>
        <button class="nav-item" onclick="switchTab('shopping', this)">
            <span class="nav-icon">◎</span><span>購 物</span>
        </button>
        <button class="nav-item" onclick="switchTab('info', this)">
            <span class="nav-icon">⌂</span><span>宿 泊</span>
        </button>
        <button class="nav-item" onclick="switchTab('packing', this)">
            <span class="nav-icon">◩</span><span>行 囊</span>
        </button>
    </nav>

    <script>
        // 預設行程資料
        const defaultItinerary = [
            {
                day: "Day 1",
                spots: [
                    { time: "06:30", type: "transport", title: "成田機場 T1 著", maps: "成田國際機場第1航廈" },
                    { time: "09:00", type: "hotel", title: "池袋之家 行李寄放", maps: "House Ikebukuro" },
                    { time: "10:00", type: "spot", title: "池袋 Sunshine City", maps: "Sunshine City Tokyo", shops: ["fukuya", "Disney Store", "Sanrio", "Rodeo Crowns", "Pokemon Center", "蠟筆小新", "Kiddy Land", "吉卜力", "graniph"] },
                    { time: "11:00", type: "spot", title: "池袋 PARCO", maps: "池袋PARCO", shops: ["coly pop 谷美", "世界堂", "吉伊卡哇餐廳", "Snidel", "動漫店"] },
                    { time: "11:00", type: "spot", title: "池袋 LUMINE", maps: "LUMINE池袋", shops: ["Snidel", "Emoda"] },
                    { time: "隨性", type: "spot", title: "池袋周邊散策", maps: "池袋站", shops: ["Chiikawa專區", "K-BOOKS", "指南針", "Animate", "駿河屋", "LOFT", "Pet Paradise", "GU"] }
                ]
            },
            {
                day: "Day 2",
                spots: [
                    { time: "10:00", type: "spot", title: "原宿竹下通 / 表參道", maps: "原宿竹下通", shops: ["Pet Paradise", "fukuya", "哈利波特", "Number Sugar", "美少女戰士", "graniph", "Kiddy Land", "Laforet", "malya"] },
                    { time: "13:00", type: "spot", title: "澀谷 109", maps: "SHIBUYA109", shops: ["Emoda", "Liz Lisa", "Resexxy", "Dazzlin", "Majestic Legon", "Kastane"] },
                    { time: "16:00", type: "spot", title: "澀谷 PARCO", maps: "澀谷PARCO", shops: ["Chiikawa", "Jump Shop", "Snidel", "寶可夢"] },
                    { time: "18:00", type: "spot", title: "澀谷街頭尋寶", maps: "澀谷站", shops: ["LOFT", "Village Vanguard", "Disney Store", "Animate", "唐吉訶德", "Tower Records", "Adidas"] }
                ]
            },
            {
                day: "Day 3",
                spots: [
                    { time: "10:00", type: "spot", title: "神田明神 參拜", maps: "神田明神", shops: [] },
                    { time: "11:30", type: "spot", title: "秋葉原 電器街", maps: "秋葉原站", shops: ["Animate", "駿河屋", "K-BOOKS", "Gamers", "GiGO", "Volks Hobby", "Yodobashi", "atré Cospa", "LoveLive", "3Coins", "graniph"] },
                    { time: "15:00", type: "spot", title: "晴空塔 SkyTree", maps: "東京晴空塔", shops: ["Conan Plaza", "Chiikawa", "Disney Store", "Tree Village", "Jump Shop", "Pokemon Center", "Sanrio", "NHK"] },
                    { time: "18:30", type: "spot", title: "東京車站一番街", maps: "東京車站一番街", shops: ["蠟筆小新", "寶可夢", "吉伊卡哇", "宮崎駿"] }
                ]
            },
            {
                day: "Day 4",
                spots: [
                    { time: "10:30", type: "spot", title: "新宿丸井百貨", maps: "新宿丸井百貨 本館", shops: ["Chiikawa", "指南針", "駿河屋", "Animate", "Snidel"] },
                    { time: "13:00", type: "spot", title: "新宿 LUMINE 2", maps: "LUMINE 2 新宿", shops: ["Snidel"] },
                    { time: "15:00", type: "spot", title: "新宿 LUMINE EST", maps: "LUMINE EST 新宿", shops: ["Liz Lisa", "Emoda", "Resexxy"] },
                    { time: "17:30", type: "spot", title: "新宿街頭", maps: "新宿站", shops: ["Pet Paradise", "JINS"] },
                    { time: "20:00", type: "spot", title: "池袋在地超市", maps: "池袋站", shops: ["超市生鮮", "超商甜點"] }
                ]
            },
            {
                day: "Day 5",
                spots: [
                    { time: "09:00", type: "spot", title: "kesatokyo 和服體驗", maps: "kesatokyo", shops: [] },
                    { time: "11:00", type: "spot", title: "淺草雷門與仲見世通", maps: "淺草寺 雷門", shops: ["かみみつや(團子)", "壽壽喜園", "淺草炸肉餅"] }
                ]
            },
            {
                day: "Day 6",
                spots: [
                    { time: "08:40", type: "spot", title: "東京迪士尼海洋", maps: "東京迪士尼海洋", shops: ["達菲熊周邊", "Fantasy Springs"] }
                ]
            },
            {
                day: "Day 7",
                spots: [
                    { time: "10:00", type: "spot", title: "池袋唐吉訶德 最終採買", maps: "唐吉訶德 池袋東口店", shops: ["藥妝", "零食"] },
                    { time: "14:00", type: "hotel", title: "池袋之家 提取行囊", maps: "House Ikebukuro", shops: [] },
                    { time: "18:00", type: "transport", title: "成田機場 T1 歸途", maps: "成田國際機場第1航廈", shops: [] }
                ]
            }
        ];

        const defaultPacking = [
            { text: "護照與 Visit Japan Web 憑證", checked: false },
            { text: "手提行李電子秤", checked: false },
            { text: "折疊式擴充購物袋", checked: false },
            { text: "海外回饋信用卡", checked: false },
            { text: "行動電源與充電線材", checked: false },
            { text: "舒適耐走的鞋履", checked: false },
            { text: "休足時間/痠痛貼布", checked: false }
        ];

        // 為了確保不被舊快取干擾，更新了儲存鍵值 (v3)
        let itineraryData = JSON.parse(localStorage.getItem('tokyo_itinerary_v3')) || defaultItinerary;
        let shoppingList = JSON.parse(localStorage.getItem('tokyo_shopping_v3')) || [];
        let packingData = JSON.parse(localStorage.getItem('tokyo_packing_v3')) || defaultPacking;
        
        let currentDayIndex = 0;
        let isEditMode = false;

        window.onload = function() {
            renderItinerary();
            renderShoppingList();
            renderPackingList();
        };

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`panel-${tabId}`).classList.add('active');
            element.classList.add('active');
            document.getElementById('daySelector').style.display = (tabId === 'itinerary') ? 'flex' : 'none';
        }

        function switchDay(index) {
            currentDayIndex = index;
            document.querySelectorAll('.day-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === index);
            });
            renderItinerary();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editModeBtn');
            btn.classList.toggle('active', isEditMode);
            btn.innerText = isEditMode ? "完 成" : "編 輯";
            
            document.querySelectorAll('.edit-controls').forEach(el => el.style.display = isEditMode ? 'flex' : 'none');
            document.getElementById('addSpotBtn').style.display = isEditMode ? 'block' : 'none';
            
            if(!isEditMode) saveToLocalStorage();
        }

        function saveToLocalStorage() {
            localStorage.setItem('tokyo_itinerary_v3', JSON.stringify(itineraryData));
            localStorage.setItem('tokyo_shopping_v3', JSON.stringify(shoppingList));
            localStorage.setItem('tokyo_packing_v3', JSON.stringify(packingData));
        }

        function renderItinerary() {
            const listContainer = document.getElementById('itinerary-list');
            listContainer.innerHTML = '';
            const currentDay = itineraryData[currentDayIndex];
            
            if (!currentDay.spots || currentDay.spots.length === 0) {
                listContainer.innerHTML = `<p style="text-align:center;color:var(--text-light);padding:30px;">是日留白，點擊編輯以記錄行程。</p>`;
                return;
            }

            currentDay.spots.forEach((spot, index) => {
                const card = document.createElement('div');
                card.className = `card ${spot.type || 'spot'}`;
                
                let shopsHTML = '';
                if (spot.shops && spot.shops.length > 0) {
                    const tags = spot.shops.map(shop => `<span class="tag">${shop}</span>`).join('');
                    shopsHTML = `
                        <div class="shop-box">
                            <div class="shop-title">📝 探訪清單</div>
                            <div class="tags-container">${tags}</div>
                        </div>
                    `;
                }

                // 完全修正的 Google Maps 官方查詢 API
                const mapQuery = encodeURIComponent(spot.maps || spot.title);
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${mapQuery}`;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-time">${spot.time}</span>
                        <div style="flex-grow:1;">
                            <div class="card-title">${spot.title}</div>
                        </div>
                    </div>
                    ${shopsHTML}
                    <a class="map-btn" href="${mapUrl}" target="_blank">在地圖上查看</a>
                    <div class="edit-controls" style="display: ${isEditMode ? 'flex' : 'none'}">
                        <button class="btn-action" onclick="moveSpot(${index}, -1)">上 移</button>
                        <button class="btn-action" onclick="moveSpot(${index}, 1)">下 移</button>
                        <button class="btn-action" style="color:#d63031; border-color:#d63031;" onclick="deleteSpot(${index})">刪 除</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function moveSpot(index, direction) {
            const spots = itineraryData[currentDayIndex].spots;
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= spots.length) return;
            const temp = spots[index];
            spots[index] = spots[targetIndex];
            spots[targetIndex] = temp;
            renderItinerary();
            saveToLocalStorage();
        }

        function deleteSpot(index) {
            if (confirm("是否抹除此筆行程？")) {
                itineraryData[currentDayIndex].spots.splice(index, 1);
                renderItinerary();
                saveToLocalStorage();
            }
        }

        function addNewSpotPrompt() {
            const title = prompt("地點名稱：");
            if (!title) return;
            const time = prompt("預定時間（例：14:30）：", "隨性");
            const rawShops = prompt("清單細項（多個請用逗號分隔）：");
            const shops = rawShops ? rawShops.split(/[,，]/).map(s => s.trim()) : [];
            
            itineraryData[currentDayIndex].spots.push({
                time: time || "隨性",
                type: "spot",
                title: title,
                maps: title,
                shops: shops
            });
            renderItinerary();
            saveToLocalStorage();
        }

        function renderShoppingList() {
            const container = document.getElementById('shopping-list-container');
            container.innerHTML = '';
            if(shoppingList.length === 0) {
                container.innerHTML = `<p style="color:var(--text-light); text-align:center; padding:20px;">尚無記錄。</p>`;
                return;
            }
            shoppingList.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = `shop-list-item ${item.checked ? 'checked' : ''}`;
                row.innerHTML = `
                    <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleShoppingItem(${index})">
                    <span class="shop-list-text">${item.text}</span>
                    <span class="delete-btn" onclick="deleteShoppingItem(${index})">刪除</span>
                `;
                container.appendChild(row);
            });
        }

        function addShoppingItem() {
            const input = document.getElementById('newShopItemInput');
            const text = input.value.trim();
            if(!text) return;
            shoppingList.push({ text: text, checked: false });
            input.value = '';
            renderShoppingList();
            saveToLocalStorage();
        }

        function toggleShoppingItem(index) {
            shoppingList[index].checked = !shoppingList[index].checked;
            renderShoppingList();
            saveToLocalStorage();
        }

        function deleteShoppingItem(index) {
            shoppingList.splice(index, 1);
            renderShoppingList();
            saveToLocalStorage();
        }

        function renderPackingList() {
            const container = document.getElementById('packing-list-container');
            container.innerHTML = '';
            packingData.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = `shop-list-item ${item.checked ? 'checked' : ''}`;
                row.innerHTML = `
                    <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="togglePackingItem(${index})">
                    <span class="shop-list-text">${item.text}</span>
                `;
                container.appendChild(row);
            });
        }

        function togglePackingItem(index) {
            packingData[index].checked = !packingData[index].checked;
            renderPackingList();
            saveToLocalStorage();
        }
    </script>
</body>
</html>
